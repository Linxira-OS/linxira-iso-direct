LABEL linxira_nbd
TEXT HELP
Boot the Linxira OS live installer using NBD.
It allows you to install Linxira OS or perform system maintenance.
ENDTEXT
MENU LABEL Linxira OS Live Installer (%ARCH%, NBD)
LINUX ::/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD ::/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archiso_nbd_srv=${pxeserver} cms_verify=y
SYSAPPEND 3

